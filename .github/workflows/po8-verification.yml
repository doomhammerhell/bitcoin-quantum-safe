name: PO-4/PO-5/PO-8 Verification - Coq Extraction vs Rust

on:
  push:
    branches: [main, develop]
    paths:
      - "formal/coq/**"
      - "src/**"
      - "tests/**"
      - "examples/generate_golden_vectors.rs"
      - "examples/generate_varint_refinement.rs"
      - "examples/generate_witness_refinement.rs"
      - "examples/generate_sighash_refinement.rs"
      - "examples/generate_txid_refinement.rs"
      - "examples/generate_transition_refinement.rs"
      - "examples/generate_transition_kernel_refinement.rs"
      - "examples/generate_runtime_refinement.rs"
      - "build_extraction.sh"
      - "compare_transition_kernel_refinement.py"
      - "verify_source_refinement.sh"
      - "verify_compiled_refinement.sh"
      - "verify_sighash_refinement.sh"
      - "verify_txid_refinement.sh"
      - "verify_transition_refinement.sh"
      - "verify_transition_kernel_refinement.sh"
      - "verify_runtime_refinement.sh"
      - ".github/workflows/po8-verification.yml"
      - "Cargo.toml"
  pull_request:
    branches: [main]
    paths:
      - "formal/coq/**"
      - "src/**"
      - "tests/**"
      - "examples/generate_golden_vectors.rs"
      - "examples/generate_varint_refinement.rs"
      - "examples/generate_witness_refinement.rs"
      - "examples/generate_sighash_refinement.rs"
      - "examples/generate_txid_refinement.rs"
      - "examples/generate_transition_refinement.rs"
      - "examples/generate_transition_kernel_refinement.rs"
      - "examples/generate_runtime_refinement.rs"
      - "build_extraction.sh"
      - "compare_transition_kernel_refinement.py"
      - "verify_source_refinement.sh"
      - "verify_compiled_refinement.sh"
      - "verify_sighash_refinement.sh"
      - "verify_txid_refinement.sh"
      - "verify_transition_refinement.sh"
      - "verify_transition_kernel_refinement.sh"
      - "verify_runtime_refinement.sh"
      - ".github/workflows/po8-verification.yml"
      - "Cargo.toml"

env:
  COQ_VERSION: 8.18.0
  OCAML_VERSION: 4.14.0
  KANI_VERSION: 0.67.0

jobs:
  # Job 1: Extract Coq to OCaml and generate golden vectors
  extract-coq:
    runs-on: ubuntu-latest
    name: Extract Coq to OCaml

    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          dune-cache: true
          opam-disable-sandboxing: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Coq via opam
        run: |
          opam install -y coq.${{ env.COQ_VERSION }}
          opam exec -- coqc --version

      - name: Build extraction artifacts
        run: |
          opam exec -- bash ./build_extraction.sh

      - name: Upload Coq vectors
        uses: actions/upload-artifact@v4
        with:
          name: coq-golden-vectors
          path: formal/coq/extraction/coq_vectors.json

      - name: Upload Coq varint refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: coq-varint-refinement
          path: formal/coq/extraction/coq_varint_refinement.json

      - name: Upload Coq witness refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: coq-witness-refinement
          path: formal/coq/extraction/coq_witness_refinement.json

      - name: Upload Coq sighash refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: coq-sighash-refinement
          path: formal/coq/extraction/coq_sighash_refinement.json

      - name: Upload Coq txid refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: coq-txid-refinement
          path: formal/coq/extraction/coq_txid_refinement.json

      - name: Upload Coq transition refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: coq-transition-refinement
          path: formal/coq/extraction/coq_transition_refinement.json

      - name: Upload Coq transition-kernel refinement witnesses
        uses: actions/upload-artifact@v4
        with:
          name: coq-transition-kernel-refinement
          path: formal/coq/extraction/coq_transition_kernel_refinement.json

  # Job 2: Generate Rust golden vectors
  generate-rust-vectors:
    runs-on: ubuntu-latest
    name: Generate Rust Golden Vectors

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Generate Rust vectors
        run: |
          cargo run --example generate_golden_vectors > rust_vectors.json
          cargo run --example generate_varint_refinement > rust_varint_refinement.json
          cargo run --example generate_witness_refinement > rust_witness_refinement.json
          cargo run --example generate_sighash_refinement > rust_sighash_refinement.json
          cargo run --example generate_txid_refinement > rust_txid_refinement.json
          cargo run --example generate_transition_refinement > rust_transition_refinement.json
          cargo run --example generate_transition_kernel_refinement > rust_transition_kernel_refinement.json

      - name: Upload Rust vectors
        uses: actions/upload-artifact@v4
        with:
          name: rust-golden-vectors
          path: rust_vectors.json

      - name: Upload Rust varint refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-varint-refinement
          path: rust_varint_refinement.json

      - name: Upload Rust witness refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-witness-refinement
          path: rust_witness_refinement.json

      - name: Upload Rust sighash refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-sighash-refinement
          path: rust_sighash_refinement.json

      - name: Upload Rust txid refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-txid-refinement
          path: rust_txid_refinement.json

      - name: Upload Rust transition refinement summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-transition-refinement
          path: rust_transition_refinement.json

      - name: Upload Rust transition-kernel refinement witnesses
        uses: actions/upload-artifact@v4
        with:
          name: rust-transition-kernel-refinement
          path: rust_transition_kernel_refinement.json

  # Job 3: Compare and verify
  compare-vectors:
    runs-on: ubuntu-latest
    name: Compare Coq vs Rust Vectors
    needs: [extract-coq, generate-rust-vectors]

    steps:
      - uses: actions/checkout@v4

      - name: Download Coq vectors
        uses: actions/download-artifact@v4
        with:
          name: coq-golden-vectors

      - name: Download Rust vectors
        uses: actions/download-artifact@v4
        with:
          name: rust-golden-vectors

      - name: Download Coq varint refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-varint-refinement

      - name: Download Rust varint refinement summary
        uses: actions/download-artifact@v4
        with:
          name: rust-varint-refinement

      - name: Download Coq witness refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-witness-refinement

      - name: Download Rust witness refinement summary
        uses: actions/download-artifact@v4
        with:
          name: rust-witness-refinement

      - name: Download Coq sighash refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-sighash-refinement

      - name: Download Rust sighash refinement summary
        uses: actions/download-artifact@v4
        with:
          name: rust-sighash-refinement

      - name: Download Coq txid refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-txid-refinement

      - name: Download Rust txid refinement summary
        uses: actions/download-artifact@v4
        with:
          name: rust-txid-refinement

      - name: Download Coq transition refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-transition-refinement

      - name: Download Rust transition refinement summary
        uses: actions/download-artifact@v4
        with:
          name: rust-transition-refinement

      - name: Download Coq transition-kernel refinement witnesses
        uses: actions/download-artifact@v4
        with:
          name: coq-transition-kernel-refinement

      - name: Download Rust transition-kernel refinement witnesses
        uses: actions/download-artifact@v4
        with:
          name: rust-transition-kernel-refinement

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compare vectors
        run: |
          python3 << 'EOF'
          import json
          import sys

          # Load Coq vectors
          with open('coq_vectors.json', 'r') as f:
              coq_data = json.load(f)

          # Load Rust vectors
          with open('rust_vectors.json', 'r') as f:
              rust_data = json.load(f)

          with open('coq_varint_refinement.json', 'r') as f:
              coq_varint = json.load(f)

          with open('rust_varint_refinement.json', 'r') as f:
              rust_varint = json.load(f)

          with open('coq_witness_refinement.json', 'r') as f:
              coq_witness = json.load(f)

          with open('rust_witness_refinement.json', 'r') as f:
              rust_witness = json.load(f)

          with open('coq_sighash_refinement.json', 'r') as f:
              coq_sighash = json.load(f)

          with open('rust_sighash_refinement.json', 'r') as f:
              rust_sighash = json.load(f)

          with open('coq_txid_refinement.json', 'r') as f:
              coq_txid = json.load(f)

          with open('rust_txid_refinement.json', 'r') as f:
              rust_txid = json.load(f)

          with open('coq_transition_refinement.json', 'r') as f:
              coq_transition = json.load(f)

          with open('rust_transition_refinement.json', 'r') as f:
              rust_transition = json.load(f)

          with open('coq_transition_kernel_refinement.json', 'r') as f:
              coq_transition_kernel = json.load(f)

          with open('rust_transition_kernel_refinement.json', 'r') as f:
              rust_transition_kernel = json.load(f)

          print(f"Coq vectors: {len(coq_data)} test cases")
          print(f"Rust vectors: {len(rust_data)} test cases")

          # Build lookup by name
          coq_by_name = {v['name']: v for v in coq_data}
          rust_by_name = {v['name']: v for v in rust_data}

          mismatches = []
          missing = []
          unexpected = []

          for name in coq_by_name:
              if name not in rust_by_name:
                  missing.append(f"Rust missing: {name}")
                  continue

              coq_vec = coq_by_name[name]
              rust_vec = rust_by_name[name]

              # Compare pk_len
              if coq_vec['pk_len'] != rust_vec['pk_len']:
                  mismatches.append(f"{name}: pk_len mismatch - Coq:{coq_vec['pk_len']} vs Rust:{rust_vec['pk_len']}")

              # Compare sig_len
              if coq_vec['sig_len'] != rust_vec['sig_len']:
                  mismatches.append(f"{name}: sig_len mismatch - Coq:{coq_vec['sig_len']} vs Rust:{rust_vec['sig_len']}")

              # Compare witness (the critical check)
              if coq_vec['witness'] != rust_vec['witness']:
                  mismatches.append(f"{name}: WITNESS MISMATCH!")
                  mismatches.append(f"  Coq:  {coq_vec['witness'][:100]}...")
                  mismatches.append(f"  Rust: {rust_vec['witness'][:100]}...")

          for name in rust_by_name:
              if name not in coq_by_name:
                  unexpected.append(f"Unexpected Rust vector: {name}")

          if missing:
              print("\n=== MISSING VECTORS ===")
              for m in missing:
                  print(m)

          if unexpected:
              print("\n=== UNEXPECTED VECTORS ===")
              for u in unexpected:
                  print(u)

          if mismatches or missing or unexpected:
              print("\n=== MISMATCHES FOUND ===")
              for m in mismatches:
                  print(m)
              sys.exit(1)

          if coq_varint != rust_varint:
              print("\n=== VARINT REFINEMENT MISMATCH ===")
              print(f"Coq:  {coq_varint}")
              print(f"Rust: {rust_varint}")
              sys.exit(1)

          if coq_witness != rust_witness:
              print("\n=== WITNESS REFINEMENT MISMATCH ===")
              print(f"Coq:  {coq_witness}")
              print(f"Rust: {rust_witness}")
              sys.exit(1)

          if coq_sighash != rust_sighash:
              print("\n=== SIGHASH TRANSCRIPT REFINEMENT MISMATCH ===")
              print(f"Coq:  {coq_sighash}")
              print(f"Rust: {rust_sighash}")
              sys.exit(1)

          if coq_txid != rust_txid:
              print("\n=== TXID PREIMAGE REFINEMENT MISMATCH ===")
              print(f"Coq:  {coq_txid}")
              print(f"Rust: {rust_txid}")
              sys.exit(1)

          if coq_transition != rust_transition:
              print("\n=== TRANSITION REFINEMENT MISMATCH ===")
              print(f"Coq:  {coq_transition}")
              print(f"Rust: {rust_transition}")
              sys.exit(1)

          if coq_transition_kernel != rust_transition_kernel:
              import subprocess
              sys.exit(
                  subprocess.run(
                      [
                          sys.executable,
                          "compare_transition_kernel_refinement.py",
                          "coq_transition_kernel_refinement.json",
                          "rust_transition_kernel_refinement.json",
                      ]
                  ).returncode
              )

          print("\n=== SUCCESS: all bounded vectors match byte-for-byte ===")
          print("=== SUCCESS: exhaustive u16 varint refinement summaries match ===")
          print("=== SUCCESS: witness parser/serializer/consensus-domain/trace refinement summaries match ===")
          print("=== SUCCESS: sighash transcript refinement summaries match ===")
          print("=== SUCCESS: txid preimage refinement summaries match ===")
          print("=== SUCCESS: UTXO transition/final-state refinement summaries match ===")
          print("=== SUCCESS: TransitionKernel per-case structured witnesses match ===")
          print("PO-8: bounded Coq witness model ↔ Rust encoding implementation extraction-boundary evidence")
          print("PO-4: Coq sighash transcript model ↔ Rust preimage serialization evidence")
          print("PO-5: Coq txid/UTXO transition/final-state model ↔ Rust implementation extraction-boundary evidence")
          print("PO-5: CoqExtractedTransitionKernel oracle ↔ Rust TransitionKernel adapter per-case report evidence")
          EOF

  # Job 4: Run Coq proofs
  verify-coq-proofs:
    runs-on: ubuntu-latest
    name: Verify Coq Proofs (PO-1, PO-2, PO-3, PO-4, PO-5, PO-7)

    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          opam-disable-sandboxing: true

      - name: Install Coq via opam
        run: |
          opam install -y coq.${{ env.COQ_VERSION }}
          opam exec -- coqc --version

      - name: Build all proofs
        working-directory: formal/coq
        run: |
          opam exec -- make clean
          opam exec -- make all

      - name: Verify proof completion
        run: |
          echo "Checking compiled artifacts..."
          ls -la formal/coq/*.vo
          echo "All proofs compiled successfully"

  # Job 5: Verify Rust source-level bounded refinement harnesses
  verify-rust-source-refinement:
    runs-on: ubuntu-latest
    name: Verify Rust Source Refinement (Kani)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier --version "${{ env.KANI_VERSION }}"
          cargo kani --version

      - name: Run source-level refinement harnesses
        run: |
          bash ./verify_source_refinement.sh

  # Job 6: Validate compiled release artifacts against Coq extraction
  verify-compiled-refinement:
    runs-on: ubuntu-latest
    name: Verify Compiled Refinement
    needs: [extract-coq]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Coq vectors
        uses: actions/download-artifact@v4
        with:
          name: coq-golden-vectors
          path: formal/coq/extraction

      - name: Download Coq varint refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-varint-refinement
          path: formal/coq/extraction

      - name: Download Coq witness refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-witness-refinement
          path: formal/coq/extraction

      - name: Run compiled-artifact translation validation
        run: |
          ./verify_compiled_refinement.sh

      - name: Upload compiled refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: compiled-refinement-certificate
          path: target/compiled-refinement/compiled_refinement_certificate.json

  # Job 7: Validate compiled sighash transcript artifacts against Coq extraction
  verify-sighash-refinement:
    runs-on: ubuntu-latest
    name: Verify Sighash Refinement
    needs: [extract-coq]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Coq sighash refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-sighash-refinement
          path: formal/coq/extraction

      - name: Run sighash transcript refinement validation
        run: |
          ./verify_sighash_refinement.sh

      - name: Upload sighash refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: sighash-refinement-certificate
          path: target/sighash-refinement/sighash_refinement_certificate.json

  # Job 8: Validate compiled transition artifacts against Coq extraction
  verify-txid-refinement:
    runs-on: ubuntu-latest
    name: Verify Txid Preimage Refinement
    needs: [extract-coq]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Coq txid refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-txid-refinement
          path: formal/coq/extraction

      - name: Run txid preimage refinement validation
        run: |
          ./verify_txid_refinement.sh

      - name: Upload txid refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: txid-refinement-certificate
          path: target/txid-refinement/txid_refinement_certificate.json

  # Job 9: Validate compiled transition artifacts against Coq extraction
  verify-transition-refinement:
    runs-on: ubuntu-latest
    name: Verify Transition Refinement
    needs: [extract-coq]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Coq transition refinement summary
        uses: actions/download-artifact@v4
        with:
          name: coq-transition-refinement
          path: formal/coq/extraction

      - name: Run transition refinement validation
        run: |
          ./verify_transition_refinement.sh

      - name: Upload transition refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: transition-refinement-certificate
          path: target/transition-refinement/transition_refinement_certificate.json

  # Job 10: Validate compiled transition-kernel adapter artifacts against Coq extraction
  verify-transition-kernel-refinement:
    runs-on: ubuntu-latest
    name: Verify TransitionKernel Refinement
    needs: [extract-coq]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Coq transition-kernel refinement witnesses
        uses: actions/download-artifact@v4
        with:
          name: coq-transition-kernel-refinement
          path: formal/coq/extraction

      - name: Run transition-kernel refinement validation
        run: |
          ./verify_transition_kernel_refinement.sh

      - name: Upload transition-kernel refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: transition-kernel-refinement-certificate
          path: target/transition-kernel-refinement/transition_kernel_refinement_certificate.json

  # Job 11: Validate runtime txid and UTXO-store refinement artifacts
  verify-runtime-refinement:
    runs-on: ubuntu-latest
    name: Verify Runtime Txid/Map Refinement

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run runtime refinement validation
        run: |
          ./verify_runtime_refinement.sh

      - name: Upload runtime refinement certificate
        uses: actions/upload-artifact@v4
        with:
          name: runtime-refinement-certificate
          path: target/runtime-refinement/runtime_refinement_certificate.json

  # Job 12: Performance benchmarks
  run-benchmarks:
    runs-on: ubuntu-latest
    name: ML-DSA-44 Performance Benchmarks

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run benchmarks
        run: |
          cargo bench --bench ml_dsa_bench -- --output-format bencher | tee benchmark.txt

      - name: Extract throughput metrics
        run: |
          echo "### ML-DSA-44 Performance Metrics" > benchmark_report.md
          echo "" >> benchmark_report.md
          echo "| Operation | Throughput | Notes |" >> benchmark_report.md
          echo "|-----------|-----------|-------|" >> benchmark_report.md
          grep "ml_dsa_44_verify" benchmark.txt | head -1 >> benchmark_report.md
          grep "ml_dsa_44_batch" benchmark.txt | head -1 >> benchmark_report.md
          cat benchmark_report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark.txt
            benchmark_report.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmark_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # Summary
  verification-summary:
    runs-on: ubuntu-latest
    name: PO-4/PO-5/PO-8 Verification Summary
    needs: [compare-vectors, verify-coq-proofs, verify-rust-source-refinement, verify-compiled-refinement, verify-sighash-refinement, verify-txid-refinement, verify-transition-refinement, verify-runtime-refinement, run-benchmarks]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "PO-4/PO-5/PO-8 VERIFICATION SUMMARY"
          echo "========================================"
          echo ""
          echo "✓ Coq serializer extraction to OCaml: COMPLETED"
          echo "✓ Coq bounded parser/serializer canonicality: VERIFIED"
          echo "✓ Exhaustive u16 varint refinement Coq vs Rust: COMPLETED"
          echo "✓ Witness parser/serializer/consensus-domain/trace refinement matrix + symbolic state-space Coq vs Rust: COMPLETED"
          echo "✓ Sighash transcript refinement Coq vs Rust: COMPLETED"
          echo "✓ Txid preimage refinement Coq vs Rust: COMPLETED"
          echo "✓ UTXO transition/final-state refinement Coq vs Rust: COMPLETED"
          echo "✓ Rust source-level bounded parser and PO-5 transition/final-state refinement harnesses (Kani): VERIFIED"
          echo "✓ Compiled release artifact translation validation: VERIFIED"
          echo "✓ Compiled sighash transcript artifact validation: VERIFIED"
          echo "✓ Compiled txid preimage artifact validation: VERIFIED"
